<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Professional Form Validation</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            background-color: white;
            width: 350px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
        }

        .container h2{
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .form-group{
            margin-bottom: 18px;
        }

        label{
            font-weight: bold;
            color: #444;
            display: block;
            margin-bottom: 6px;
        }

        input{
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
            font-size: 14px;
        }

        input:focus{
            border-color: #007bff;
        }

        .error{
            color: red;
            font-size: 13px;
            margin-top: 5px;
            display: block;
        }

        .btn{
            width: 100%;
            padding: 12px;
            border: none;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover{
            background-color: #0056b3;
        }

    </style>
</head>

<body>

    <div class="container">

        <h2>Registration Form</h2>

        <form onsubmit="return submitForm()">

            <div class="form-group">
                <label>Name</label>
                <input type="text" id="username" placeholder="Enter your name">
                <span class="error" id="Msg1"></span>
            </div>


            <div class="form-group">
                <label>Mobile Number</label>
                <input type="text" id="usernumber" placeholder="Enter your number">
                <span class="error" id="Msg2"></span>
            </div>


            <div class="form-group">
                <label>Email ID</label>
                <input type="text" id="useremail" placeholder="Enter your email">
                <span class="error" id="Msg3"></span>
            </div>


            <input type="submit" value="Submit" class="btn">

        </form>

    </div>

    <script>

        function submitForm(){

            let Username = document.getElementById("username").value.trim();
            let Usernumber = document.getElementById("usernumber").value.trim();
            let Useremail = document.getElementById("useremail").value.trim();

            let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

            if(Username === ""){
                document.getElementById("Msg1").innerHTML = "Please enter your name";
                return false;
            }
            else{
                document.getElementById("Msg1").innerHTML = "";
            }

            if(Usernumber === ""){
                document.getElementById("Msg2").innerHTML = "Please enter your mobile number";
                return false;
            }
            else if(isNaN(Usernumber)){
                document.getElementById("Msg2").innerHTML = "Only numbers are allowed";
                return false;
            }
            else if(Usernumber.length != 10){
                document.getElementById("Msg2").innerHTML = "Mobile number must be 10 digits";
                return false;
            }
            else{
                document.getElementById("Msg2").innerHTML = "";
            }

            if(Useremail === ""){
                document.getElementById("Msg3").innerHTML = "Please enter your email";
                return false;
            }
            else if(!emailPattern.test(Useremail)){
                document.getElementById("Msg3").innerHTML = "Please enter a valid email";
                return false;
            }
            else{
                document.getElementById("Msg3").innerHTML = "";
            }

            alert("Form submitted successfully!");

            return true;
        }

    </script>

</body>
</html>
