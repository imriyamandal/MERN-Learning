<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <style>
        *{
            margin: 0;
        }
        body{
            margin: 0px;
        }
        .Main1{
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #Main1_Image{
            width: 100vw;
            height: 100vh;
        }
        .Sub11{
            position: absolute;
            right: 50px;
            top: 50px;
        }
        .Sub11 img{
            width: 150px;
        }
        .Sub12{
            position: absolute;
            left: 70px;
            top: 10px;
        }
        .Sub12 img{
            width: 300px;
        }
        .Sub13{
            font-size: xx-large;
            position: absolute;
            left: 70px;
            top: 200px;
            color: silver;
        }
        .Sub13 td{
            padding-bottom: 40px;
            transition: all 0.5s;
        }
        .Sub14{
            transition: all 1s;
            font-size: 80px;
            text-align: center;
            position: absolute;
            bottom: 15vh;
            width: 80vw;
            left: 5vw;
            color: silver;
            opacity: 0.5;
            opacity:all 1s ease-in-out;
        }
        .Main1:hover .Sub14{
            opacity: 1;
            bottom: 5vh;
            left: 10vw;
        }
        span{
            color: rgb(194, 35, 35);
        }
        .Sub13 td:hover{
            padding-left: 40px;
            color: rgb(194, 35, 35);
        }
    </style>
<body>
    <div class="Main1">
        <img src="https://cdna.artstation.com/p/assets/images/images/027/383/850/large/ashu-malik-new-bugati011.jpg?1591373160" alt="" id="Main1_Image">

        <div class="Sub11">
            <img src="https://www.pngmart.com/files/22/Bugatti-Logo-PNG-Image.png" alt="">
        </div>

        <div class="Sub12">
            <img src="https://1000logos.net/wp-content/uploads/2020/02/Bugatti-Color.png" alt="">
        </div>

        <div class="Sub13">
            <table>
                <tr>
                    <td>Home</td>
                </tr>
                <tr>
                    <td>Models</td>
                </tr>
                <tr>
                    <td>Racing</td>
                </tr>
                <tr>
                    <td>Bookings</td>
                </tr>
                <tr>
                    <td>About</td>
                </tr>
            </table>
        </div>

        <div class="Sub14">
            <h1>Bugatti <span> Veyron</span></h1>
        </div>

    </div>
</body>
</html>
