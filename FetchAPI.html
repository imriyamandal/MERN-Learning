<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fetch API Example</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        #data-container {
            margin-top: 20px;
            display: grid;
            gap: 15px;
        }

        .post {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.2);
        }

        .post h2 {
            margin: 0;
            color: #007bff;
        }

        .post p {
            color: #555;
        }

        button {
            display: block;
            margin: auto;
            padding: 10px 20px;
            border: none;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

    <h1>API Data</h1>

    <button onclick="getApi()">Fetch API</button>

    <div id="data-container"></div>

    <script>
        function getApi() {

            const container = document.getElementById("data-container");

            // Clear old data
            container.innerHTML = "";

            fetch("https://jsonplaceholder.typicode.com/posts")

                .then(function(response) {
                    return response.json();
                })

                .then(function(data) {

                    // Show first 5 posts
                    for (let i = 0; i < 5; i++) {

                        const post = document.createElement("div");
                        post.classList.add("post");

                        post.innerHTML = `
                            <h2>${data[i].id}. ${data[i].title}</h2>
                            <p>${data[i].body}</p>
                        `;

                        container.appendChild(post);
                    }
                })

                .catch(function(error) {
                    console.log("Error:", error);

                    container.innerHTML = `
                        <p style="color:red;">
                            Failed to load API data.
                        </p>
                    `;
                });
        }
    </script>

</body>
</html>
